name: trids
channels:
  - nvidia/label/cuda-12.6.0
  - pytorch
  - nvidia
  - conda-forge

# Note: The version of PyTorch must be compatible with CUDA
# Here all of code are compiled with CUDA-12.6
dependencies:
  - python=3.12
  - cmake==3.28
  - cuda=12.6.0
  - openbabel=3.1.1
  - numpy=2.3
  - zlib
  - pybind11=2.13
  - spdlog=1.16.0
  - cli11=2.1.2
  - ninja
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch==2.7.1
    - nvidia-nvtx-cu12
    - nvidia-cudnn-cu12
